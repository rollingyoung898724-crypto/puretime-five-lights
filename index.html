<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PureTime Five Lights</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #020617;
      color: #f8fafc;
    }
    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 24px 16px 110px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .brand-small {
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #64748b;
    }
    .brand-title {
      margin-top: 6px;
      font-size: 18px;
      color: #e2e8f0;
      font-weight: 600;
    }
    .mode-pill {
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #94a3b8;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
    }
    .card {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
    }
    .section-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #64748b;
      margin: 0;
    }
    .section-title {
      font-size: 32px;
      margin: 10px 0 0;
      font-weight: 700;
    }
    .section-subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin: 10px 0 0;
      line-height: 1.5;
    }
    .stars-list {
      margin-top: 24px;
      display: grid;
      gap: 12px;
    }
    .star-btn {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(15,23,42,0.75);
      border-radius: 20px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
      cursor: pointer;
    }
    .star-btn:active {
      transform: scale(0.99);
    }
    .star-name {
      font-size: 14px;
      font-weight: 600;
      margin: 0;
    }
    .star-hint {
      font-size: 12px;
      color: #64748b;
      margin: 6px 0 0;
    }
    .dot {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      transition: all 0.25s ease;
    }
    .dot.active {
      background: #fef3c7;
      box-shadow: 0 0 16px rgba(255,235,170,0.75);
    }
    .node-card {
      margin-top: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(15,23,42,0.85);
      border-radius: 28px;
      padding: 20px;
    }
    .node-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-size: 14px;
      color: #cbd5e1;
    }
    .node-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px 0;
    }
    .node {
      border-radius: 999px;
      transition: all 0.3s ease;
      position: relative;
    }
    .node::before, .node::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      inset: 12px;
    }
    .node::after {
      inset: 28px;
      border-color: rgba(255,255,255,0.08);
    }
    .node-0 { width: 64px; height: 64px; background: rgba(255,255,255,0.08); }
    .node-1 { width: 84px; height: 84px; background: rgba(252,211,77,0.5); box-shadow: 0 0 18px rgba(255,220,140,0.18); }
    .node-2 { width: 96px; height: 96px; background: rgba(253,230,138,0.65); box-shadow: 0 0 22px rgba(255,230,160,0.22); }
    .node-3 { width: 112px; height: 112px; background: rgba(254,243,199,0.82); box-shadow: 0 0 30px rgba(255,230,160,0.32); }
    .node-4 { width: 128px; height: 128px; background: rgba(254,243,199,0.92); box-shadow: 0 0 38px rgba(255,235,170,0.40); }
    .node-5 { width: 144px; height: 144px; background: rgba(255,251,235,1); box-shadow: 0 0 54px rgba(255,240,180,0.50); }

    .center-text {
      text-align: center;
      color: #cbd5e1;
      font-size: 14px;
      margin: 0;
    }
    .primary-btn {
      width: 100%;
      margin-top: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.08);
      color: white;
      border-radius: 18px;
      padding: 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }
    .chip {
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      color: #cbd5e1;
    }
    .path-list {
      position: relative;
      margin-top: 24px;
      padding-left: 10px;
    }
    .path-list::before {
      content: "";
      position: absolute;
      left: 15px;
      top: 8px;
      bottom: 8px;
      width: 1px;
      background: rgba(255,255,255,0.1);
    }
    .path-item {
      position: relative;
      display: flex;
      gap: 16px;
      margin-bottom: 18px;
    }
    .path-node {
      width: 12px;
      height: 12px;
      margin-top: 8px;
      border-radius: 999px;
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.12);
    }
    .path-node.l1, .path-node.l2 { background: rgba(253,224,71,0.7); }
    .path-node.l3, .path-node.l4 { background: rgba(254,240,138,0.9); box-shadow: 0 0 14px rgba(255,230,160,0.45); }
    .path-node.l5 { background: #fef3c7; box-shadow: 0 0 18px rgba(255,240,180,0.65); }
    .path-node.today { box-shadow: 0 0 0 5px rgba(254,243,199,0.15); }
    .path-card {
      flex: 1;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(15,23,42,0.65);
      border-radius: 20px;
      padding: 14px 16px;
    }
    .path-head {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .path-head span:last-child {
      color: #94a3b8;
      font-size: 12px;
    }
    .bars {
      display: flex;
      gap: 6px;
    }
    .bar {
      height: 10px;
      flex: 1;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
    }
    .bar.on {
      background: rgba(254,243,199,0.92);
    }
    .reflection-grid {
      margin-top: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(15,23,42,0.75);
      border-radius: 28px;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }
    .reflection-dot {
      aspect-ratio: 1 / 1;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
    }
    .reflection-dot.on {
      background: rgba(254,243,199,0.9);
      box-shadow: 0 0 12px rgba(255,235,170,0.35);
    }
    .stats {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .stat {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(15,23,42,0.65);
      border-radius: 18px;
      padding: 16px 10px;
      text-align: center;
    }
    .stat-value {
      font-size: 22px;
      font-weight: 700;
    }
    .stat-label {
      margin-top: 6px;
      font-size: 12px;
      color: #94a3b8;
    }
    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: rgba(2,6,23,0.92);
      backdrop-filter: blur(12px);
      padding: 14px 16px;
    }
    .bottom-nav-inner {
      max-width: 430px;
      margin: 0 auto;
      display: flex;
      gap: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      border-radius: 24px;
      padding: 6px;
    }
    .tab-btn {
      flex: 1;
      border: 0;
      background: transparent;
      color: #94a3b8;
      border-radius: 18px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .tab-btn.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <div class="brand-small">PureTime</div>
        <div class="brand-title">Five Lights</div>
      </div>
      <div class="mode-pill">Gentle Mode</div>
    </div>

    <section id="todayView" class="card">
      <p class="section-label">Today</p>
      <h1 class="section-title">April 5</h1>
      <p class="section-subtitle">A little light still counts.</p>

      <div class="stars-list" id="starsList"></div>

      <div class="node-card">
        <div class="node-head">
          <span>Today Node</span>
          <span id="todayCount">0 / 5</span>
        </div>
        <div class="node-wrap">
          <div id="todayNode" class="node node-0"></div>
        </div>
        <p class="center-text" id="todayText">0 of 5 lights today</p>
      </div>

      <button class="primary-btn" onclick="showTab('path')">View My Path</button>
    </section>

    <section id="pathView" class="card hidden">
      <p class="section-label">Star Path</p>
      <h2 class="section-title">April Path</h2>

      <div class="chips">
        <div class="chip">5 days lit</div>
        <div class="chip"><span id="totalLightsChip">19</span> lights</div>
        <div class="chip">3-day streak</div>
      </div>

      <div class="path-list" id="pathList"></div>

      <button class="primary-btn" onclick="showTab('reflection')">Monthly Reflection</button>
    </section>

    <section id="reflectionView" class="card hidden">
      <p class="section-label">Reflection</p>
      <h2 class="section-title">April Summary</h2>
      <p class="section-subtitle">Not every day was full, but the path is still yours.</p>

      <div class="reflection-grid" id="reflectionGrid"></div>

      <div class="stats">
        <div class="stat">
          <div class="stat-value">5</div>
          <div class="stat-label">Days Lit</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="totalLightsStat">19</div>
          <div class="stat-label">Total Lights</div>
        </div>
        <div class="stat">
          <div class="stat-value">3</div>
          <div class="stat-label">Best Streak</div>
        </div>
      </div>
    </section>
  </div>

  <div class="bottom-nav">
    <div class="bottom-nav-inner">
      <button id="tabToday" class="tab-btn active" onclick="showTab('today')">Today</button>
      <button id="tabPath" class="tab-btn" onclick="showTab('path')">Path</button>
      <button id="tabReflection" class="tab-btn" onclick="showTab('reflection')">Reflection</button>
    </div>
  </div>

  <script>
    const prayers = [
      { name: "Fajr", active: true },
      { name: "Dhuhr", active: true },
      { name: "Asr", active: false },
      { name: "Maghrib", active: true },
      { name: "Isha", active: false }
    ];

    const pathDays = [
      { day: 1, lights: 5 },
      { day: 2, lights: 4 },
      { day: 3, lights: 5 },
      { day: 4, lights: 2 },
      { day: 5, lights: 3, today: true },
      { day: 6, lights: 0 },
      { day: 7, lights: 0 }
    ];

    function activeCount() {
      return prayers.filter(p => p.active).length;
    }

    function totalLights() {
      let previous = pathDays.reduce((sum, item) => sum + (item.today ? 0 : item.lights), 0);
      return previous + activeCount();
    }

    function renderStars() {
      const el = document.getElementById("starsList");
      el.innerHTML = "";
      prayers.forEach((star, index) => {
        const btn = document.createElement("button");
        btn.className = "star-btn";
        btn.innerHTML = `
          <div>
            <p class="star-name">${star.name}</p>
            <p class="star-hint">${star.active ? "Light recorded" : "Tap to light"}</p>
          </div>
          <div class="dot ${star.active ? "active" : ""}"></div>
        `;
        btn.onclick = () => {
          prayers[index].active = !prayers[index].active;
          renderAll();
        };
        el.appendChild(btn);
      });
    }

    function renderToday() {
      const count = activeCount();
      document.getElementById("todayCount").textContent = `${count} / 5`;
      document.getElementById("todayText").textContent =
        count === 5 ? "Today is fully lit." : `${count} of 5 lights today`;

      const node = document.getElementById("todayNode");
      node.className = `node node-${count}`;
    }

    function renderPath() {
      const el = document.getElementById("pathList");
      el.innerHTML = "";
      const count = activeCount();

      pathDays.forEach(item => {
        const lights = item.today ? count : item.lights;
        const row = document.createElement("div");
        row.className = "path-item";

        let bars = "";
        for (let i = 0; i < 5; i++) {
          bars += `<div class="bar ${i < lights ? "on" : ""}"></div>`;
        }

        row.innerHTML = `
          <div class="path-node l${lights} ${item.today ? "today" : ""}"></div>
          <div class="path-card">
            <div class="path-head">
              <span>Day ${item.day}</span>
              <span>${lights}/5</span>
            </div>
            <div class="bars">${bars}</div>
          </div>
        `;
        el.appendChild(row);
      });

      document.getElementById("totalLightsChip").textContent = totalLights();
    }

    function renderReflection() {
      const grid = document.getElementById("reflectionGrid");
      grid.innerHTML = "";
      const total = totalLights();

      for (let i = 0; i < 28; i++) {
        const dot = document.createElement("div");
        dot.className = "reflection-dot" + (i < total ? " on" : "");
        grid.appendChild(dot);
      }

      document.getElementById("totalLightsStat").textContent = total;
    }

    function showTab(tab) {
      document.getElementById("todayView").classList.add("hidden");
      document.getElementById("pathView").classList.add("hidden");
      document.getElementById("reflectionView").classList.add("hidden");
      document.getElementById("tabToday").classList.remove("active");
      document.getElementById("tabPath").classList.remove("active");
      document.getElementById("tabReflection").classList.remove("active");

      if (tab === "today") {
        document.getElementById("todayView").classList.remove("hidden");
        document.getElementById("tabToday").classList.add("active");
      } else if (tab === "path") {
        document.getElementById("pathView").classList.remove("hidden");
        document.getElementById("tabPath").classList.add("active");
      } else {
        document.getElementById("reflectionView").classList.remove("hidden");
        document.getElementById("tabReflection").classList.add("active");
      }
    }

    function renderAll() {
      renderStars();
      renderToday();
      renderPath();
      renderReflection();
    }

    renderAll();
  </script>
</body>
</html>
