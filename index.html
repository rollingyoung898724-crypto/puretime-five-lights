<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PureTime Five Lights</title>
  <style>
    :root {
      --bg: #0f1220;
      --card: rgba(255,255,255,0.06);
      --line: rgba(255,255,255,0.08);
      --text: #f6f2ea;
      --muted: #b8b4ad;
      --gold: #e7c98a;
      --gold-soft: rgba(231,201,138,0.14);
      --danger: #d88c8c;
      --shadow: 0 20px 50px rgba(0,0,0,0.25);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --transition: 180ms ease;
      --max: 1080px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(231,201,138,0.08), transparent 28%),
        linear-gradient(180deg, #0b0e18 0%, #12172a 45%, #0f1220 100%);
    }

    body {
      padding: 24px 16px 60px;
    }

    .app {
      max-width: var(--max);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand-title {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .brand-sub {
      font-size: 0.88rem;
      color: var(--muted);
    }

    .page {
      display: none;
      animation: fadeIn 220ms ease;
    }

    .page.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero,
    .card,
    .light-card,
    .summary-card,
    .setting-group,
    .month-day {
      background: var(--card);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .hero {
      border-radius: var(--radius-xl);
      padding: 24px;
      margin-bottom: 18px;
    }

    .card,
    .setting-group,
    .summary-card,
    .light-card {
      border-radius: var(--radius-xl);
      padding: 22px;
    }

    .date-line {
      color: var(--gold);
      font-size: 0.95rem;
      margin-bottom: 10px;
    }

    .hero h1,
    .section-title {
      margin: 0;
      line-height: 1.15;
    }

    .hero h1 {
      font-size: clamp(1.8rem, 3vw, 2.5rem);
      margin-bottom: 10px;
    }

    .hero p,
    .small-note,
    .section-sub,
    .setting-group p {
      color: var(--muted);
      line-height: 1.65;
      margin: 0;
    }

    .stack,
    .summary-grid,
    .lights-preview,
    .light-list,
    .month-grid,
    .feelings,
    .settings-grid {
      display: grid;
      gap: 18px;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .label,
    .eyebrow {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 6px;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 999px;
      cursor: pointer;
      transition: transform var(--transition), background var(--transition), border-color var(--transition), opacity var(--transition);
      font-size: 0.95rem;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.14);
    }

    .btn-primary {
      background: linear-gradient(180deg, rgba(231,201,138,0.22), rgba(214,176,109,0.12));
      border-color: rgba(231,201,138,0.34);
      color: #fff5de;
    }

    .btn-danger {
      border-color: rgba(216,140,140,0.35);
      color: #ffd7d7;
    }

    .cta-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.05);
      margin-top: 14px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, rgba(231,201,138,0.5), rgba(231,201,138,0.95));
      border-radius: 999px;
      transition: width 220ms ease;
    }

    .lights-preview {
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }

    .preview-light {
      border-radius: var(--radius-lg);
      padding: 14px 10px;
      background: rgba(255,255,255,0.035);
      border: 1px solid var(--line);
      text-align: center;
    }

    .preview-orb {
      width: 52px;
      height: 52px;
      margin: 0 auto 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      display: grid;
      place-items: center;
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }

    .preview-orb::after {
      content: "";
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      transition: all var(--transition);
    }

    .preview-light.lit .preview-orb,
    .light-status-dot.lit {
      background: radial-gradient(circle at 30% 30%, rgba(255,245,222,0.85), rgba(231,201,138,0.42));
      border-color: rgba(231,201,138,0.45);
      box-shadow: 0 0 24px rgba(231,201,138,0.2);
    }

    .preview-light.lit .preview-orb::after {
      background: rgba(255,248,234,0.92);
      box-shadow: 0 0 18px rgba(255,248,234,0.5);
    }

    .preview-name {
      font-size: 0.92rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .preview-desc {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .footer-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .light-list {
      grid-template-columns: 1fr;
    }

    .light-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 12px;
    }

    .light-head-left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .light-status-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    .light-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin: 0 0 4px;
    }

    .light-desc {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.55;
      margin: 0;
    }

    .light-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
    }

    .meta-chip {
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.84rem;
      background: rgba(255,255,255,0.045);
      border: 1px solid var(--line);
      color: var(--muted);
    }

    .meta-chip.success {
      color: #fcedcc;
      border-color: rgba(231,201,138,0.25);
      background: rgba(231,201,138,0.1);
    }

    .section-block {
      margin-top: 18px;
    }

    .section-title {
      font-size: 1.15rem;
      margin-bottom: 8px;
    }

    textarea,
    input,
    select {
      width: 100%;
      background: rgba(255,255,255,0.045);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
      font: inherit;
      outline: none;
      transition: border-color var(--transition), background var(--transition);
    }

    textarea:focus,
    input:focus,
    select:focus {
      border-color: rgba(231,201,138,0.38);
      background: rgba(255,255,255,0.06);
    }

    textarea {
      min-height: 136px;
      resize: vertical;
      line-height: 1.6;
    }

    .feelings {
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    }

    .feeling-btn {
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      cursor: pointer;
      transition: all var(--transition);
      text-align: center;
    }

    .feeling-btn.active {
      background: rgba(231,201,138,0.14);
      border-color: rgba(231,201,138,0.32);
      color: #fff3d7;
    }

    .save-status {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .summary-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .summary-card .big {
      font-size: 1.35rem;
      font-weight: 700;
    }

    .month-grid {
      grid-template-columns: repeat(7, minmax(0, 1fr));
      margin-top: 16px;
    }

    .month-day {
      border-radius: 18px;
      padding: 12px 10px;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
      cursor: pointer;
      transition: transform var(--transition), border-color var(--transition), background var(--transition);
    }

    .month-day:hover {
      transform: translateY(-1px);
      border-color: rgba(231,201,138,0.2);
      background: rgba(255,255,255,0.08);
    }

    .month-day.today {
      border-color: rgba(231,201,138,0.36);
    }

    .month-day.selected {
      border-color: rgba(231,201,138,0.54);
      box-shadow: 0 0 0 1px rgba(231,201,138,0.12), var(--shadow);
    }

    .month-day .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .month-day .num {
      font-weight: 700;
      font-size: 0.96rem;
    }

    .mini-lights {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .mini-lights span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .mini-lights span.lit {
      background: rgba(231,201,138,0.95);
      box-shadow: 0 0 10px rgba(231,201,138,0.24);
      border-color: rgba(231,201,138,0.34);
    }

    .month-day .small {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .settings-grid {
      grid-template-columns: 1fr;
    }

    .setting-group h3 {
      margin: 0 0 8px;
      font-size: 1.05rem;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .inline-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin-top: 12px;
    }

    .toggle {
      position: relative;
      width: 54px;
      height: 32px;
      background: rgba(255,255,255,0.12);
      border: 1px solid var(--line);
      border-radius: 999px;
      cursor: pointer;
      transition: all var(--transition);
      flex-shrink: 0;
    }

    .toggle::after {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      top: 3px;
      left: 3px;
      border-radius: 50%;
      background: #f7f2e9;
      transition: all var(--transition);
    }

    .toggle.active {
      background: rgba(231,201,138,0.32);
      border-color: rgba(231,201,138,0.32);
    }

    .toggle.active::after {
      left: 25px;
      background: #fff7e5;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      cursor: pointer;
    }

    .pill.active {
      background: rgba(231,201,138,0.14);
      border-color: rgba(231,201,138,0.3);
      color: #fff2d0;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 960px) {
      .lights-preview {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .summary-grid,
      .field-grid {
        grid-template-columns: 1fr;
      }

      .month-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 16px 12px 40px;
      }

      .hero,
      .card,
      .light-card,
      .setting-group,
      .summary-card {
        padding: 18px;
      }

      .month-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .footer-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="brand-title">PureTime</div>
        <div class="brand-sub">Five Lights</div>
      </div>
      <button class="btn" id="topSettingsBtn">Settings</button>
    </div>

    <!-- TODAY -->
    <section class="page active" id="page-today">
      <div class="hero">
        <div class="date-line" id="todayDateLine"></div>
        <h1 id="todayTitle"></h1>
        <p id="todaySubtitle"></p>
      </div>

      <div class="card">
        <div class="card-header">
          <div>
            <div class="label" id="todayProgressLabel"></div>
            <h2 id="todayProgressText"></h2>
          </div>
        </div>

        <div class="progress-bar">
          <div class="progress-fill" id="todayProgressFill"></div>
        </div>

        <div style="height:18px;"></div>
        <div class="lights-preview" id="todayLightsPreview"></div>

        <div style="height:18px;"></div>
        <div class="cta-row">
          <button class="btn btn-primary" id="openTodayBtn"></button>
          <button class="btn" id="quickMonthBtn">View this month</button>
        </div>

        <div style="height:10px;"></div>
        <div class="small-note" id="todayReassurance"></div>
      </div>

      <div class="card">
        <div class="footer-row">
          <div>
            <div class="eyebrow" id="streakLabel"></div>
            <div id="streakValue"></div>
          </div>
          <div>
            <div class="eyebrow">Selected date</div>
            <div id="selectedDateSummary"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="small-note" id="todayBottomQuote"></div>
      </div>
    </section>

    <!-- DETAIL -->
    <section class="page" id="page-detail">
      <div class="hero">
        <div class="cta-row">
          <button class="btn" id="backToTodayBtn"></button>
          <button class="btn" id="detailOpenMonthBtn">Month</button>
        </div>
        <div class="date-line" id="detailDateLine"></div>
        <h1 id="detailTitle"></h1>
        <p id="detailSubtitle"></p>
      </div>

      <div class="card">
        <div class="card-header">
          <div>
            <div class="label" id="detailProgressLabel"></div>
            <h2 id="detailProgressText"></h2>
          </div>
        </div>
        <div class="small-note" id="detailSupport"></div>
      </div>

      <div class="light-list" id="detailLightList"></div>

      <div class="card section-block" id="reflectionCard">
        <h2 class="section-title" id="reflectionTitle"></h2>
        <p class="section-sub" id="reflectionHelper"></p>
        <textarea id="reflectionInput"></textarea>

        <div class="section-block">
          <h2 class="section-title" id="feelingTitle"></h2>
          <div class="feelings" id="feelingButtons"></div>
        </div>

        <div class="save-status" id="saveStatusText"></div>
      </div>

      <div class="card">
        <div class="small-note" id="detailClosingLine"></div>
      </div>
    </section>

    <!-- MONTH -->
    <section class="page" id="page-month">
      <div class="hero">
        <div class="cta-row">
          <button class="btn" id="monthBackBtn"></button>
        </div>
        <div class="date-line" id="monthDateLine"></div>
        <h1 id="monthTitle"></h1>
        <p id="monthSubtitle"></p>
      </div>

      <div class="summary-grid" id="monthSummaryGrid"></div>

      <div class="card">
        <h2 class="section-title" id="monthGridTitle"></h2>
        <div class="month-grid" id="monthGrid"></div>
      </div>

      <div class="card">
        <div class="small-note" id="monthSummaryLine"></div>
      </div>
    </section>

    <!-- SETTINGS -->
    <section class="page" id="page-settings">
      <div class="hero">
        <div class="cta-row">
          <button class="btn" id="settingsBackBtn">Back</button>
        </div>
        <div class="date-line">PureTime</div>
        <h1 id="settingsTitle"></h1>
        <p id="settingsSubtitle"></p>
      </div>

      <div class="settings-grid">
        <div class="setting-group">
          <h3 id="profileTitle"></h3>
          <p id="profileSub"></p>
          <div class="field">
            <label for="nameInput" id="nameLabel"></label>
            <input id="nameInput" type="text" />
          </div>
        </div>

        <div class="setting-group">
          <h3 id="languageTitle"></h3>
          <p id="languageSub"></p>
          <div class="field">
            <select id="languageSelect">
              <option value="en">English</option>
              <option value="ar">Arabic</option>
              <option value="both">English + Arabic</option>
            </select>
          </div>
        </div>

        <div class="setting-group">
          <h3 id="appearanceTitle"></h3>
          <p id="appearanceSub"></p>
          <div class="field">
            <select id="themeSelect">
              <option value="dark">Dark</option>
              <option value="light">Light</option>
              <option value="auto">Auto</option>
            </select>
          </div>
        </div>

        <div class="setting-group">
          <h3 id="remindersTitle"></h3>
          <p id="remindersSub"></p>

          <div class="inline-row">
            <div><strong id="enableRemindersLabel"></strong></div>
            <div class="toggle" id="remindersToggle" role="button"></div>
          </div>

          <div class="field-grid">
            <div class="field">
              <label for="morningTime" id="morningLabel"></label>
              <input id="morningTime" type="time" />
            </div>
            <div class="field">
              <label for="afternoonTime" id="afternoonLabel"></label>
              <input id="afternoonTime" type="time" />
            </div>
            <div class="field">
              <label for="eveningTime" id="eveningLabel"></label>
              <input id="eveningTime" type="time" />
            </div>
          </div>

          <div class="field" style="margin-top:14px;">
            <label id="toneLabel"></label>
            <div class="pill-row" id="tonePills"></div>
          </div>

          <div class="field" style="margin-top:16px;">
            <label id="browserNotificationsLabel"></label>
            <div class="small-note" id="browserNotificationsSub"></div>
            <div class="cta-row" style="margin-top:12px;">
              <button class="btn" id="enableNotificationsBtn"></button>
              <div class="small-note" id="notificationStatusText"></div>
            </div>
          </div>
        </div>

        <div class="setting-group">
          <h3 id="dailyViewTitle"></h3>
          <p id="dailyViewSub"></p>

          <div class="inline-row">
            <div id="showReflectionLabel"></div>
            <div class="toggle" id="showReflectionToggle" role="button"></div>
          </div>

          <div class="inline-row">
            <div id="showStreakLabel"></div>
            <div class="toggle" id="showStreakToggle" role="button"></div>
          </div>

          <div class="inline-row">
            <div id="showMonthSummaryLabel"></div>
            <div class="toggle" id="showMonthSummaryToggle" role="button"></div>
          </div>
        </div>

        <div class="setting-group">
          <h3 id="privacyTitle"></h3>
          <p id="privacySub"></p>
        </div>

        <div class="setting-group">
          <h3 id="dataTitle"></h3>
          <p id="dataSub"></p>
          <div class="cta-row">
            <button class="btn btn-danger" id="clearDataBtn"></button>
          </div>
        </div>

        <div class="setting-group">
          <p id="settingsBottomLine" class="small-note"></p>
        </div>
      </div>
    </section>
  </div>

  <script>
    const STORAGE_KEY = "puretime-five-lights-prayer-v2";

    const copy = {
      today: {
        title: "Today’s Five Lights",
        progressLabel: "Today’s prayer progress",
        openButton: "Open today",
        reassurance: "No pressure. You can return at your own pace.",
        streakLabel: "Gentle streak",
        bottomQuotes: [
          "A small light can still change the tone of a day.",
          "You are allowed to begin again today.",
          "This space is yours: quiet, private, and gentle.",
          "Even one small return still counts.",
          "A soft beginning is still a beginning."
        ],
        subtitles: [
          "A gentle way to hold the five prayers of today.",
          "Return softly, one prayer at a time.",
          "A quiet space for prayer, reflection, and return.",
          "You do not need to rush through the day.",
          "Five lights, one day, at your own pace."
        ]
      },
      detail: {
        back: "Back to today",
        title: "A gentle page for this day",
        progressLabel: "Prayer status",
        support: "You can mark this day prayer by prayer.",
        reflectionTitle: "Reflection",
        reflectionHelper: "A few words are enough. This space is private.",
        reflectionPlaceholder: "Write a few quiet words for this day...",
        feelingTitle: "How did this day feel?",
        saveSaving: "Saving...",
        saveSaved: "All changes saved",
        closingLines: [

        return {
          ...defaults,
          ...parsed,
          profile: { ...defaults.profile, ...(parsed.profile || {}) },
          settings: { ...defaults.settings, ...(parsed.settings || {}) },
          ui: { ...defaults.ui, ...(parsed.ui || {}) },
          stats: { ...defaults.stats, ...(parsed.stats || {}) },
          days: parsed.days || {}
        };
      } catch (error) {
        console.error("Failed to load state:", error);
        return createDefaultState();

    function todayKey() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function selectedDateKey() {
      return state.ui.selectedDate || todayKey();
    }

    function ensureSelectedDate() {
      if (!state.ui.selectedDate) {
        state.ui.selectedDate = todayKey();
      }
    }

    function getDayData(key = selectedDateKey()) {
      if (!state.days[key]) {
        state.days[key] = {
          completed: [false, false, false, false, false],
          completedAt: {},
          reflection: "",
          feeling: "",
          lastUpdated: new Date().toISOString()
        };
      }
      return state.days[key];
    }

    function completedCount(dayData) {
      return dayData.completed.filter(Boolean).length;
    }

    function progressPercent(dayData) {
      return (completedCount(dayData) / copy.lights.length) * 100;
    }

    function saveState(showStatus = false) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        if (showStatus) setSaveStatus(copy.detail.saveSaved);
      } catch (error) {
        console.error("Failed to save:", error);
      }
    }

    function setSaveStatus(text) {
      els.saveStatusText.textContent = text;
      if (saveStatusTimer) clearTimeout(saveStatusTimer);
      saveStatusTimer = setTimeout(() => {
        els.saveStatusText.textContent = copy.detail.saveSaved;
      }, 1800);
    }

    function formatLongDate(date = new Date()) {
      return new Intl.DateTimeFormat("en-GB", {
        weekday: "long",
        month: "long",
        day: "numeric"
      }).format(date);
    }

    function formatLongDateWithYear(date = new Date()) {
      return new Intl.DateTimeFormat("en-GB", {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric"
      }).format(date);
    }

    function formatMonthYear(date = new Date()) {
      return new Intl.DateTimeFormat("en-GB", {
        month: "long",
        year: "numeric"
      }).format(date);
    }

    function formatTime(date = new Date()) {
      return new Intl.DateTimeFormat("en-GB", {
        hour: "numeric",
        minute: "2-digit"
      }).format(date);
    }

    function randomFrom(arr, seedKey = todayKey()) {
      let hash = 0;
      for (let i = 0; i < seedKey.length; i++) {
        hash = (hash << 5) - hash + seedKey.charCodeAt(i);
        hash |= 0;
      }
      return arr[Math.abs(hash) % arr.length];
    }

    function showPage(name) {
      if (name !== "settings") {
        previousPageBeforeSettings = name;
      }
      currentPage = name;
      Object.entries(els.pages).forEach(([key, page]) => {
        page.classList.toggle("active", key === name);
      });
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function selectDate(key, goToDetail = false) {
      state.ui.selectedDate = key;
      saveState();
      render();
      if (goToDetail) showPage("detail");
    }

    function daysReturnedInMonth(baseDate = new Date()) {
      const y = baseDate.getFullYear();
      const m = baseDate.getMonth();
      return Object.entries(state.days).filter(([key, day]) => {
        const d = new Date(key + "T00:00:00");
        return d.getFullYear() === y && d.getMonth() === m && completedCount(day) > 0;
      }).length;
    }

    function lightsLitInMonth(baseDate = new Date()) {
      const y = baseDate.getFullYear();
      const m = baseDate.getMonth();
      return Object.entries(state.days).reduce((sum, [key, day]) => {
        const d = new Date(key + "T00:00:00");
        if (d.getFullYear() === y && d.getMonth() === m) {
          return sum + completedCount(day);
        }
        return sum;
      }, 0);
    }

    function getCurrentStreak() {
      let streak = 0;
      const cursor = new Date();
      cursor.setHours(0, 0, 0, 0);

      while (true) {
        const key = cursor.toISOString().slice(0, 10);
        const day = state.days[key];
        if (day && completedCount(day) > 0) {
          streak += 1;
          cursor.setDate(cursor.getDate() - 1);
        } else {
          break;
        }
      }
      return streak;
    }

    function updateBestStreak() {
      const current = getCurrentStreak();
      if (current > state.stats.bestStreak) {
        state.stats.bestStreak = current;
      }
    }

    function setToggle(el, active) {
      el.classList.toggle("active", !!active);

    function toggleBooleanSetting(path) {
      state.settings[path] = !state.settings[path];
      saveState();

      } else {
        document.documentElement.style.setProperty("--card", "rgba(255,255,255,0.06)");
        document.documentElement.style.setProperty("--line", "rgba(255,255,255,0.08)");
        document.documentElement.style.setProperty("--text", "#f6f2ea");
        document.documentElement.style.setProperty("--muted", "#b8b4ad");
        document.body.style.background =
          "radial-gradient(circle at top, rgba(231,201,138,0.08), transparent 28%), linear-gradient(180deg, #0b0e18 0%, #12172a 45%, #0f1220 100%)";
      }
    }

      els.todayDateLine.textContent = formatLongDate(new Date(today + "T00:00:00"));

      els.todaySubtitle.textContent = randomFrom(copy.today.subtitles);

      els.streakLabel.textContent = copy.today.streakLabel;
      els.todayBottomQuote.textContent = randomFrom(copy.today.bottomQuotes, today + "-quote");

      const streak = getCurrentStreak();
      els.streakValue.textContent = `${streak} day${streak === 1 ? "" : "s"} of return`;
      els.streakLabel.parentElement.parentElement.parentElement.classList.toggle("hidden", !state.settings.showStreak);

      const selected = selectedDateKey();
      els.selectedDateSummary.textContent = formatLongDateWithYear(new Date(selected + "T00:00:00"));

      els.todayLightsPreview.innerHTML = "";
      copy.lights.forEach((light, index) => {

        const item = document.createElement("div");

          <div class="preview-desc">${light.desc}</div>

        els.todayLightsPreview.appendChild(item);

    function renderMonth() {
      const selected = selectedDateKey();
      const selectedDate = new Date(selected + "T00:00:00");
      const monthDate = selectedDate;
      const year = monthDate.getFullYear();
      const month = monthDate.getMonth();

      els.monthBackBtn.textContent = currentPage === "month" ? "Back to detail" : copy.month.back;
      els.monthDateLine.textContent = formatMonthYear(monthDate);
      els.monthTitle.textContent = copy.month.title;
      els.monthSubtitle.textContent = copy.month.subtitle;
      els.monthGridTitle.textContent = copy.month.gridTitle;

      const returned = daysReturnedInMonth(monthDate);
      const streak = getCurrentStreak();
      const lit = lightsLitInMonth(monthDate);

      els.monthSummaryGrid.innerHTML = `
        <div class="summary-card">
          <div class="eyebrow">${copy.month.summaryDaysReturned}</div>
          <div class="big">${returned} day${returned === 1 ? "" : "s"}</div>
        </div>
        <div class="summary-card">
          <div class="eyebrow">${copy.month.summaryStreak}</div>
          <div class="big">${streak} day${streak === 1 ? "" : "s"}</div>
        </div>
        <div class="summary-card">
          <div class="eyebrow">${copy.month.summaryLights}</div>
          <div class="big">${lit} this month</div>
        </div>
      `;
      els.monthSummaryGrid.classList.toggle("hidden", !state.settings.showMonthSummary);

      const daysInMonth = new Date(year, month + 1, 0).getDate();
      els.monthGrid.innerHTML = "";

      for (let dayNum = 1; dayNum <= daysInMonth; dayNum++) {
        const date = new Date(year, month, dayNum);
        const key = date.toISOString().slice(0, 10);
        const dayData = state.days[key];
        const count = dayData ? completedCount(dayData) : 0;
        const isToday = key === todayKey();
        const isSelected = key === selected;

        const cell = document.createElement("div");
        cell.className = `month-day ${isToday ? "today" : ""} ${isSelected ? "selected" : ""}`;
        const miniLights = Array.from({ length: 5 }).map((_, i) => {
          const litClass = dayData && dayData.completed[i] ? "lit" : "";
          return `<span class="${litClass}"></span>`;
        }).join("");

        cell.innerHTML = `
          <div class="top">
            <div class="num">${dayNum}</div>
            <div class="small">${count}/5</div>
          </div>
          <div class="mini-lights">${miniLights}</div>
          <div class="small">${count > 0 ? "Prayer marked" : "Quiet day"}</div>
        `;

        cell.addEventListener("click", () => {
          selectDate(key, true);
        });

        els.monthGrid.appendChild(cell);
      }

      if (lit <= 8) {
        els.monthSummaryLine.textContent = copy.month.low;
      } else if (lit <= 20) {
        els.monthSummaryLine.textContent = copy.month.mid;
      } else {
        els.monthSummaryLine.textContent = copy.month.high;
      }
    }

      copy.tones.forEach(tone => {
        const pill = document.createElement("button");
        pill.className = `pill ${state.settings.tone === tone ? "active" : ""}`;
        pill.type = "button";
        pill.textContent = tone;
        pill.addEventListener("click", () => {
          state.settings.tone = tone;
          saveState();
          renderSettings();
        });
        els.tonePills.appendChild(pill);
      });

      updateNotificationStatus();
    }

    function toggleLightForDate(key, index) {
      const day = getDayData(key);
      day.completed[index] = !day.completed[index];
      if (day.completed[index]) {
        day.completedAt[index] = formatTime(new Date());
      } else {
        delete day.completedAt[index];
      }
      day.lastUpdated = new Date().toISOString();
      state.stats.lastVisitDate = todayKey();
      updateBestStreak();
      saveState(true);
      render();
    }

    function bindEvents() {
      els.openTodayBtn.addEventListener("click", () => {
        selectDate(todayKey(), false);
        showPage("detail");
      });

      els.quickMonthBtn.addEventListener("click", () => {
        selectDate(todayKey(), false);
        showPage("month");
      });

      els.backToTodayBtn.addEventListener("click", () => showPage("today"));
      els.detailOpenMonthBtn.addEventListener("click", () => showPage("month"));
      els.monthBackBtn.addEventListener("click", () => showPage("detail"));

      els.topSettingsBtn.addEventListener("click", () => {
        previousPageBeforeSettings = currentPage;
        showPage("settings");
      });

      els.settingsBackBtn.addEventListener("click", () => {
        showPage(previousPageBeforeSettings || "today");
      });

      els.reflectionInput.addEventListener("input", (event) => {
        const key = selectedDateKey();
        const day = getDayData(key);
        day.reflection = event.target.value;
        day.lastUpdated = new Date().toISOString();
        els.saveStatusText.textContent = copy.detail.saveSaving;
        if (reflectionSaveTimer) clearTimeout(reflectionSaveTimer);
        reflectionSaveTimer = setTimeout(() => {
          saveState(true);
          renderMonth();
        }, 700);
      });

      els.nameInput.addEventListener("input", (event) => {
        state.profile.name = event.target.value;
        saveState();
      });

      els.languageSelect.addEventListener("change", (event) => {
        state.profile.language = event.target.value;
        saveState();
      });

      els.themeSelect.addEventListener("change", (event) => {
        state.profile.theme = event.target.value;
        saveState();
        applyTheme();
      });

      els.morningTime.addEventListener("change", (event) => {
        state.settings.morningTime = event.target.value;
        saveState();
      });

      els.afternoonTime.addEventListener("change", (event) => {
        state.settings.afternoonTime = event.target.value;
        saveState();
      });

      els.eveningTime.addEventListener("change", (event) => {
        state.settings.eveningTime = event.target.value;
        saveState();
      });

      els.remindersToggle.addEventListener("click", () => toggleBooleanSetting("remindersEnabled"));
      els.showReflectionToggle.addEventListener("click", () => toggleBooleanSetting("showReflection"));
      els.showStreakToggle.addEventListener("click", () => toggleBooleanSetting("showStreak"));
      els.showMonthSummaryToggle.addEventListener("click", () => toggleBooleanSetting("showMonthSummary"));

      els.enableNotificationsBtn.addEventListener("click", async () => {
        if (!("Notification" in window)) return;
        try {
          const permission = await Notification.requestPermission();
          updateNotificationStatus();
          if (permission === "granted") {
            try {
              new Notification("PureTime", {
                body: "Gentle notifications are now enabled on this device."
              });
            } catch (error) {
              console.error("Notification preview failed:", error);
            }
          }
        } catch (error) {
          console.error(error);
        }
      });

      els.clearDataBtn.addEventListener("click", () => {
        const ok = confirm("This will remove your saved prayer records, reflections, and settings from this device.");
        if (!ok) return;
        state = createDefaultState();
        saveState();
        render();
        showPage("today");
      });

      window.addEventListener("beforeunload", () => {
        saveState();
      });
    }

    function render() {
      ensureSelectedDate();
      applyTheme();
      renderToday();
      renderDetail();
      renderMonth();
      renderSettings();
    }

    bindEvents();
    render();
  </script>
</body>
</html>
